name: release-cli

on:
  push:
    branches: [main]
    paths:
      - 'main.go'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - '.goreleaser.yaml'
      - '.github/workflows/release-cli.yml'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump: patch | minor | major'
        default: patch
        required: true

permissions:
  contents: read

concurrency:
  group: release-cli
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: setup go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: goreleaser check
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6.4.0
        with:
          version: latest
          args: check

  release:
    name: release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push the tag and publish the GitHub Release
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # full history needed to read the previous tag

      - name: compute next version
        id: ver
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          last=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          last=${last:-v0.0.0}
          IFS=. read -r maj min pat <<<"${last#v}"
          case "$BUMP" in
            major) maj=$((maj+1)); min=0; pat=0 ;;
            minor) min=$((min+1)); pat=0 ;;
            patch) pat=$((pat+1)) ;;
            *) echo "unknown bump: $BUMP" >&2; exit 1 ;;
          esac
          next="v${maj}.${min}.${pat}"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Releasing $next (previous tag: $last, bump: $BUMP)"

      - name: tag commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"

      - name: setup go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6.4.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Lets goreleaser push the generated formula to raphabot/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
